<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clock & Crown Live Members</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  background:transparent;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  color:#f8e7a2;
}

.board{
  width:100%;
  margin:0;
  padding:9px;
  border:1px solid rgba(212,175,55,.65);
  border-radius:16px;
  background:linear-gradient(180deg,#070707,#000);
  box-shadow:0 0 10px rgba(212,175,55,.25);
}

.title{
  margin:0 0 8px;
  text-align:center;
  font-family:Georgia,'Times New Roman',serif;
  font-size:20px;
  color:#ffe27a;
}

.members{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.member{
  display:flex;
  align-items:center;
  gap:9px;
  min-height:54px;
  padding:7px 9px;
  border-radius:12px;
  text-decoration:none;
  background:linear-gradient(
    90deg,
    rgba(48,36,5,.96),
    rgba(8,8,8,.98)
  );
  border:1px solid rgba(212,175,55,.32);
}

.avatar-wrap{
  width:40px;
  height:40px;
  flex-shrink:0;
  border-radius:50%;
  padding:2px;
  background:linear-gradient(135deg,#fff0a0,#b88a18);
}

.avatar{
  display:block;
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  background:#171717;
}

.info{
  flex:1;
  min-width:0;
}

.username{
  font-size:13px;
  font-weight:700;
  color:#fff4bd;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.joined{
  margin-top:3px;
  font-size:11px;
  color:#c9ad56;
}

.rating{
  flex-shrink:0;
  min-width:54px;
  text-align:right;
  font-size:12px;
  font-weight:700;
  color:#ffe27a;
  white-space:nowrap;
}

.status{
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-size:13px;
  color:#f5dd8b;
  background:rgba(212,175,55,.08);
}

.copyright{
  margin-top:8px;
  padding-top:7px;
  border-top:1px solid rgba(212,175,55,.2);
  text-align:center;
  font-size:10px;
  color:#a99558;
}

.creator{
  color:#d4af37;
  font-weight:700;
}
</style>
</head>

<body>

<div class="board">

  <h2 class="title">👑 Newest Members</h2>

  <div id="members" class="members">
    <div class="status">Loading members...</div>
  </div>

  <div class="copyright">
    Made by <span class="creator">DevilsGambit22</span> &copy; 2026
  </div>

</div>

<script>
const CLUB_SLUG = "clock-and-crown";
const MEMBER_LIMIT = 3;

const membersBox = document.getElementById("members");

async function getJson(url){
  const response = await fetch(url);

  if(!response.ok){
    throw new Error("Request failed");
  }

  return response.json();
}

async function getMemberDetails(member){

  const username = member.username;

  const [profileResult, statsResult] =
    await Promise.allSettled([

      getJson(
        `https://api.chess.com/pub/player/${username}`
      ),

      getJson(
        `https://api.chess.com/pub/player/${username}/stats`
      )

    ]);

  const profile =
    profileResult.status === "fulfilled"
      ? profileResult.value
      : {};

  const stats =
    statsResult.status === "fulfilled"
      ? statsResult.value
      : {};

  const ratings = [
    stats.chess_rapid?.last?.rating,
    stats.chess_blitz?.last?.rating,
    stats.chess_bullet?.last?.rating,
    stats.chess_daily?.last?.rating
  ].filter(rating => typeof rating === "number");

  return {
    ...member,

    avatar:
      profile.avatar ||
      member.avatar ||
      "",

    profileUrl:
      profile.url ||
      member.url ||
      `https://www.chess.com/member/${username}`,

    highestElo:
      ratings.length
        ? Math.max(...ratings)
        : "N/A"
  };
}

async function loadMembers(){

  try{

    const data = await getJson(
      `https://api.chess.com/pub/club/${CLUB_SLUG}/members`
    );

    const allMembers = [
      ...(data.weekly || []),
      ...(data.monthly || []),
      ...(data.all_time || [])
    ];

    const seen = new Set();

    const newestMembers = allMembers

      .filter(member => {

        const username =
          member.username?.toLowerCase();

        if(!username || seen.has(username)){
          return false;
        }

        seen.add(username);
        return true;

      })

      .sort(
        (a,b) =>
          (b.joined || 0) -
          (a.joined || 0)
      )

      .slice(0,MEMBER_LIMIT);

    const completeMembers =
      await Promise.all(
        newestMembers.map(getMemberDetails)
      );

    renderMembers(completeMembers);

  }catch(error){

    membersBox.innerHTML =
      `<div class="status">
        Board unavailable right now.
      </div>`;

  }
}

function renderMembers(members){

  if(!members.length){

    membersBox.innerHTML =
      `<div class="status">
        No members found.
      </div>`;

    return;
  }

  membersBox.innerHTML =
    members.map(member => {

      const joinedDate =
        member.joined
          ? new Date(
              member.joined * 1000
            ).toLocaleDateString()
          : "New";

      const avatarHtml =
        member.avatar

          ? `<img
               class="avatar"
               src="${member.avatar}"
               alt="${member.username}"
               loading="lazy"
             >`

          : `<div class="avatar"></div>`;

      return `

        <a
          class="member"
          href="${member.profileUrl}"
          target="_blank"
          rel="noopener"
        >

          <div class="avatar-wrap">
            ${avatarHtml}
          </div>

          <div class="info">

            <div class="username">
              ${member.username}
            </div>

            <div class="joined">
              Joined ${joinedDate}
            </div>

          </div>

          <div class="rating">
            ⭐ ${member.highestElo}
          </div>

        </a>

      `;

    }).join("");
}

loadMembers();
</script>

</body>
</html>
